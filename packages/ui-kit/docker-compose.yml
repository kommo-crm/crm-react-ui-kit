name: crm-react-ui-kit

services:
  crm-react-ui-kit:
    image: ${IMAGE}
    ipc: host
    user: root
    working_dir: "/monorepo"
    command: sh -c " apt-get update && apt-get install -y python3 build-essential &&
      corepack enable && YARN_ENABLE_SCRIPTS=false yarn install --immutable
      --ignore-engines && yarn workspace @kommo-crm/crm-react-ui-kit test:e2e:ci
      ${UPDATE_SNAPSHOTS_FLAG:-} ${GREP_FLAG:-} "
    volumes:
      - ../../:/monorepo
      # Exclude node_modules.
      - /monorepo/node_modules
      # Cache the node_modules installed inside the container and cache the directory.
      - yarn_cache:/yarn
      - node_modules_cache:/monorepo/node_modules
      - playwright_cache:/monorepo/playwright/.cache
      # Exclude anything that won't be needed in the container.
      - /monorepo/.git
      - /monorepo/.cache
      - /monorepo/.swc

volumes:
  yarn_cache:
  node_modules_cache:
  playwright_cache:
